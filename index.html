<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Shield: Overdrive</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0a16 0%, #020205 100%);
            color: #fff;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Atmosfera e Iluminação Global */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #arena {
            position: relative;
            width: 800px;
            height: 500px;
            background: rgba(5, 5, 15, 0.8);
            border: 2px solid rgba(0, 238, 255, 0.3);
            border-radius: 12px;
            box-shadow: 
                0 0 40px rgba(0, 238, 255, 0.15),
                inset 0 0 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Interface HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(0, 238, 255, 0.8);
            text-shadow: 0 0 10px rgba(0, 238, 255, 0.5);
            z-index: 5;
        }

        /* O Jogador (Escudo de Energia Dinâmico) */
        #player {
            position: absolute;
            bottom: 30px;
            left: 375px; /* Centralizado inicialmente */
            width: 70px;
            height: 14px;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            border-radius: 20px;
            box-shadow: 
                0 0 20px #00ffff,
                0 0 40px #0088ff,
                0 -4px 15px rgba(0, 255, 255, 0.8);
            transition: transform 0.1s ease-out;
        }

        /* Inimigos / Projéteis Metálicos com Brilho */
        .projectile {
            position: absolute;
            width: 12px;
            height: 24px;
            background: linear-gradient(180deg, #ffffff 0%, #ff0055 60%, #330011 100%);
            border-radius: 6px;
            box-shadow: 
                0 0 15px #ff0055,
                0 0 30px #ff0000;
        }

        /* Tela de Game Over */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h2 {
            font-size: 3rem;
            color: #ff0055;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 258, 255, 0.2);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 25px #00ffff;
        }

        .tip {
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="arena">
        <div id="hud">
            <div>SCORE: <span id="scoreDisplay">0000</span></div>
            <div>INTEGRIDADE: <span id="shieldDisplay">100%</span></div>
        </div>
        
        <div id="player"></div>

        <div id="overlay">
            <h2 id="titleDisplay">CYBER SHIELD</h2>
            <button class="btn" onclick="startGame()">INICIAR SISTEMA</button>
            <div class="tip">Use o MOUSE ou deslize o dedo para mover o escudo lateralmente.</div>
        </div>
    </div>

    <script>
        const arena = document.getElementById('arena');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const shieldDisplay = document.getElementById('shieldDisplay');
        const overlay = document.getElementById('overlay');
        const titleDisplay = document.getElementById('titleDisplay');

        let playerX = 365;
        let score = 0;
        let shield = 100;
        let gameActive = false;
        let projectiles = [];
        let spawnInterval;
        let gameLoopInterval;
        let speedMultiplier = 1;

        // Captura o movimento do mouse dentro da arena
        arena.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = arena.getBoundingClientRect();
            // Centraliza o escudo sob o ponteiro do mouse
            playerX = e.clientX - rect.left - 35; 
            
            // Restringe o movimento dentro das bordas da arena
            if (playerX < 0) playerX = 0;
            if (playerX > 730) playerX = 730;
            
            player.style.left = playerX + 'px';
        });

        function spawnProjectile() {
            if (!gameActive) return;
            
            const p = document.createElement('div');
            p.classList.add('projectile');
            
            // Atributos lógicos do projétil
            const posX = Math.random() * 788;
            p.style.left = posX + 'px';
            p.style.top = '-30px';
            
            arena.appendChild(p);
            
            projectiles.push({
                element: p,
                x: posX,
                y: -30,
                speed: (3 + Math.random() * 4) * speedMultiplier
            });
        }

        function updateGame() {
            score += 1;
            scoreDisplay.innerText = String(score).padStart(4, '0');
            
            // Dificuldade progressiva gradual
            speedMultiplier += 0.0005;

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.y += p.speed;
                p.element.style.top = p.y + 'px';

                // Colisão com a base do jogador (Y próximo de 456px)
                if (p.y >= 440 && p.y <= 460) {
                    // Verifica se o projétil atingiu a largura ocupada pelo escudo
                    if (p.x + 12 >= playerX && p.x <= playerX + 70) {
                        // Bloqueio bem sucedido! Remove o projétil sem perder vida
                        p.element.remove();
                        projectiles.splice(i, 1);
                        score += 50; // Bônus por bloqueio
                        continue;
                    }
                }

                // Passou do jogador (Dano na integridade)
                if (p.y > 500) {
                    shield -= 25;
                    shieldDisplay.innerText = shield + '%';
                    
                    if (shield <= 0) {
                        gameOver();
                    }

                    p.element.remove();
                    projectiles.splice(i, 1);
                }
            }
        }

        function startGame() {
            // Reset de variáveis
            score = 0;
            shield = 100;
            speedMultiplier = 1;
            projectiles.forEach(p => p.element.remove());
            projectiles = [];
            
            shieldDisplay.innerText = '100%';
            scoreDisplay.innerText = '0000';
            overlay.classList.add('hidden');
            
            gameActive = true;

            // Loops do jogo
            gameLoopInterval = setInterval(updateGame, 1000 / 60); // 60 FPS
            spawnInterval = setInterval(spawnProjectile, 600);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoopInterval);
            clearInterval(spawnInterval);
            
            titleDisplay.innerText = "CONEXÃO CORROMPIDA";
            overlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
